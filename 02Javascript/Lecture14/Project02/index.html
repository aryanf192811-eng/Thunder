<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1419;
      color: #e6e6e6;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { color: #4ade80; margin: 0 0 10px; }

    #status {
      font-size: 20px;
      font-weight: 600;
      margin: 15px 0;
      min-height: 28px;
    }

    /* The board is just a 3x3 CSS grid — no positioning math needed.
       The browser handles laying out the 9 cells for us. */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      background: #2a3340;
      padding: 6px;
      border-radius: 8px;
    }

    .cell {
      background: #1a2028;
      border: none;
      font-size: 48px;
      font-weight: 700;
      color: #f1f5f9;
      cursor: pointer;
      border-radius: 4px;
    }
    .cell:hover:not(:disabled) { background: #243042; }
    .cell:disabled { cursor: not-allowed; }

    .x { color: #60a5fa; }
    .o { color: #f87171; }

    button.reset {
      margin-top: 20px;
      padding: 10px 24px;
      font-size: 15px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button.reset:hover { background: #15803d; }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <button class="cell" id="0"></button>
    <button class="cell" id="1"></button>
    <button class="cell" id="2"></button>
    <button class="cell" id="3"></button>
    <button class="cell" id="4"></button>
    <button class="cell" id="5"></button>
    <button class="cell" id="6"></button>
    <button class="cell" id="7"></button>
    <button class="cell" id="8"></button>
  </div>

  <button class="reset" id="resetBtn">Reset Game</button>

  <script src="./first.js">
   
  </script>
</body>
</html>
