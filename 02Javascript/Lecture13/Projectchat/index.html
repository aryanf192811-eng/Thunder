<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Talk to AI</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #0d0d0d;
      color: #e4e4e4;
      min-height: 100vh;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #999;
      margin: 0 0 30px 0;
    }

    #chatBox {
      height: 480px;
      overflow-y: auto;
      padding: 4px;
      margin-bottom: 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }

    .message {
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
    }
    .user    { background: #1f1f1f; margin-left: auto; }
    .ai      { color: #e4e4e4; padding-left: 0; padding-right: 0; }
    .loading { color: #555; }

    #inputArea {
      display: flex;
      gap: 10px;
      border-top: 1px solid #1f1f1f;
      padding-top: 20px;
    }
    #userInput {
      flex: 1;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e4e4e4;
      font-size: 15px;
      outline: none;
    }
    #userInput:focus { border-color: #444; }

    button {
      padding: 12px 22px;
      background: #e4e4e4;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    /* Subtle scrollbar so it doesn't break the dark look */
    #chatBox::-webkit-scrollbar { width: 6px; }
    #chatBox::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

  <h1>Chat Bot</h1>

  <div id="chatBox"></div>

  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button id="sendBtn">Send</button>
  </div> 
  <script src="./first.js"></script>
</body>
</html>
