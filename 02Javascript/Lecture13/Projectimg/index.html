<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Image Generator</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #0d0d0d;
      color: #e4e4e4;
      min-height: 100vh;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #999;
      margin: 0 0 30px 0;
    }

    #inputArea {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    #promptInput {
      flex: 1;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e4e4e4;
      font-size: 15px;
      outline: none;
    }
    #promptInput:focus { border-color: #444; }

    button {
      padding: 12px 22px;
      background: #e4e4e4;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    #imageArea {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #1a1a1a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #555;
      font-size: 14px;
    }
    #imageArea img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #downloadBtn {
      display: none;       
      margin-top: 16px;
      background: transparent;
      color: #999;
      border: 1px solid #2a2a2a;
      padding: 10px 18px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    #downloadBtn:hover { color: #e4e4e4; border-color: #444; }
  </style>
</head>
<body>

  <h1>AI Image Generator</h1>

  <div id="inputArea">
    <input type="text" id="promptInput" placeholder="Describe an image..." />
    <button id="generateBtn">Generate</button>
  </div>

  <div id="imageArea">Your image will appear here</div>

  <a id="downloadBtn" download="ai-image.jpg">Download</a>

  <script>
    /*
      FIRST THOUGHT PRINCIPLE — why is this code surprisingly short?

      An <img> tag fetches whatever URL we put in its `src` attribute.
      It doesn't care if that URL points to a file on disk or to an AI
      that generates a fresh image on the fly. To the browser, a URL is a URL.

      Pollinations gives us a URL that, when visited, returns a generated image:
          https://image.pollinations.ai/prompt/{your prompt}

      So our entire job is:
        1. Read what the user typed.
        2. Build that URL.
        3. Put it in an <img> tag.

      That's the whole project. The rest is just polish.
    */

    const promptInput = document.getElementById("promptInput");
    const generateBtn = document.getElementById("generateBtn");
    const imageArea   = document.getElementById("imageArea");
    const downloadBtn = document.getElementById("downloadBtn");

    async function generateImage() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      // Disable the button so the user can't click 10 times while waiting
      generateBtn.disabled = true;
      downloadBtn.style.display = "none";
      imageArea.innerHTML = "Generating...";

      // Build the URL. encodeURIComponent makes spaces and special chars safe.
      const imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

      // Create a fresh <img> element in memory (not yet on the page).
      // WHY in memory first? So we can wait for it to fully load before showing it.
      // Otherwise the user sees a half-loaded broken image — bad UX.
      const img = new Image();

      img.onload = function () {
        // The image is ready. Now we put it on the page.
        imageArea.innerHTML = "";
        imageArea.appendChild(img);

        // Set up the download button to point to this image
        downloadBtn.href = imageUrl;
        downloadBtn.style.display = "inline-block";

        generateBtn.disabled = false;
      };

      img.onerror = function () {
        imageArea.innerHTML = "Something went wrong. Try again.";
        generateBtn.disabled = false;
      };

      // Setting src triggers the actual network request.
      // Until this line, nothing has happened — we only set up listeners.
      img.src = imageUrl;
    }

    generateBtn.addEventListener("click", generateImage);
    promptInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") generateImage();
    });
  </script>

</body>
</html>
